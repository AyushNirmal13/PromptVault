<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PromptVault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #18181b;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: white;
    }
    .logo-text { font-size: 16px; font-weight: 700; }
    .body { padding: 16px; }
    .status-box {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 16px 0;
    }
    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid #e0e7ff;
    }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-email { font-size: 12px; color: #71717a; }
    .stat-row {
      display: flex; gap: 8px; width: 100%; margin-top: 8px;
    }
    .stat {
      flex: 1; text-align: center;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 10px;
      border: 1px solid #f0f0f0;
    }
    .stat-num { font-size: 18px; font-weight: 700; color: #4f46e5; }
    .stat-label { font-size: 10px; color: #71717a; margin-top: 2px; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-secondary { background: #f4f4f5; color: #3f3f46; }
    .not-logged {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 20px 0;
      text-align: center;
    }
    .not-logged .icon { font-size: 36px; }
    .not-logged p { font-size: 13px; color: #71717a; line-height: 1.5; }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #e0e7ff; color: #4f46e5; font-weight: 600; }
    .footer { padding: 10px 16px; border-top: 1px solid #f0f0f0; text-align: center; font-size: 11px; color: #a1a1aa; }
    .footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">PromptVault</span>
  </div>

  <div class="body">
    <div id="pv-content">
      <div class="not-logged">
        <div class="icon">⏳</div>
        <p>Checking authentication...</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:5173" target="_blank" id="open-app">Open PromptVault ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
